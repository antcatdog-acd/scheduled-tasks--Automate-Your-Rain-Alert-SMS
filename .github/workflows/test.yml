name: Test Setup

on:
  workflow_dispatch:  # กดรันทดสอบเองด้วยมือได้ตลอดเวลา
  pull_request:       # รันอัตโนมัติเมื่อมีการทดลองส่งโค้ดใหม่เข้ามา
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # ใช้เวอร์ชันเดียวกับตัวรันจริง

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check secrets are configured
        env:
          # เปลี่ยนมาเช็คคีย์ 3 ตัวที่ใช้ใน scheduled.yml จริงของคุณ
          OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
          ACCOUNT_SID: ${{ secrets.ACCOUNT_SID }}
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
        run: |
          if [ -z "$OWM_API_KEY" ]; then
            echo "❌ OWM_API_KEY secret is not set!"
            exit 1
          else
            echo "✅ OWM_API_KEY is configured"
          fi

          if [ -z "$ACCOUNT_SID" ]; then
            echo "❌ ACCOUNT_SID secret is not set!"
            exit 1
          else
            echo "✅ ACCOUNT_SID is configured"
          fi

          if [ -z "$AUTH_TOKEN" ]; then
            echo "❌ AUTH_TOKEN secret is not set!"
            exit 1
          else
            echo "✅ AUTH_TOKEN is configured"
          fi

          echo "🎉 All required secrets are configured!"

      - name: Check required files exist
        run: |
          echo "Checking for required files..."

          if [ -f "main.py" ]; then
            echo "✅ main.py found"
          else
            echo "❌ main.py not found!"
            exit 1
          fi

          if [ -f "requirements.txt" ]; then
            echo "✅ requirements.txt found"
          else
            echo "❌ requirements.txt not found!"
            exit 1
          fi

          echo "🎉 All required files found!"

      - name: Test Python syntax
        run: python -m py_compile main.py && echo "✅ Python syntax OK (No syntax errors)"

      - name: Success
        run: |
          echo ""
          echo "========================================"
          echo "  All checks passed!"
          echo "  Your setup is ready to go."
          echo "========================================"
